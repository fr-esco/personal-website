<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Francesco Colamonici</title>
    <base href="/" />
    <meta
      content="width=device-width, initial-scale=1"
      name="viewport"
    />
    <link
      href="favicon.ico"
      rel="icon"
      type="image/x-icon"
    />
    <script>
      // Disable CSS transitions during the initial load (see `html.preload` in
      // styles.css). This prevents theme color-transitions from firing on the
      // first paint / during hydration — they are non-composited (main-thread)
      // and only exist to animate the manual theme toggle. Removed after the
      // first painted frame so the toggle still animates afterwards.
      document.documentElement.classList.add('preload')
      window.addEventListener('DOMContentLoaded', function () {
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            document.documentElement.classList.remove('preload')
          })
        })
      })

      if (
        // check if user had saved dark as their
        // theme when accessing page before
        localStorage.theme === 'dark' ||
        // or user's requesting dark color
        // scheme through operating system
        (!('theme' in localStorage) &&
          window.matchMedia('(prefers-color-scheme: dark)').matches)
      ) {
        // then if we have access to the document and the element
        // we add the dark class to the html element and
        // store the dark value in the localStorage
        if (document && document.documentElement) {
          document.documentElement.classList.add('dark')
          localStorage.setItem('theme', 'dark')
        }
      } else {
        // else if we have access to the document and the element
        // we remove the dark class to the html element and
        // store the value light in the localStorage
        if (document && document.documentElement) {
          document.documentElement.classList.remove('dark')
          localStorage.setItem('theme', 'light')
        }
      }
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>

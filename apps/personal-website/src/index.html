<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Francesco Colamonici</title>
    <base href="/" />
    <meta
      content="width=device-width, initial-scale=1"
      name="viewport"
    />
    <!-- Browser UI color aligned to the primary (Ruby Red). Set by the inline
         script below to match the resolved theme, and kept in sync with the
         manual toggle by ThemeService. -->
    <meta
      content="#a70000"
      name="theme-color"
    />
    <link
      href="favicon.ico"
      rel="icon"
      type="image/x-icon"
    />
    <script>
      // Disable CSS transitions during the initial load (see `html.preload` in
      // styles.css). This prevents theme color-transitions from firing on the
      // first paint / during hydration — they are non-composited (main-thread)
      // and only exist to animate the manual theme toggle. Removed after the
      // first painted frame so the toggle still animates afterwards.
      document.documentElement.classList.add('preload')
      window.addEventListener('DOMContentLoaded', function () {
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            document.documentElement.classList.remove('preload')
          })
        })
      })

      // Resolve theme (saved preference, else OS setting) and apply it before
      // first paint: html.dark class, persisted value, and the theme-color meta.
      var isDark =
        localStorage.theme === 'dark' ||
        (!('theme' in localStorage) &&
          window.matchMedia('(prefers-color-scheme: dark)').matches)
      if (document && document.documentElement) {
        document.documentElement.classList.toggle('dark', isDark)
        localStorage.setItem('theme', isDark ? 'dark' : 'light')
        var themeColor = document.querySelector('meta[name="theme-color"]')
        if (themeColor) {
          themeColor.setAttribute('content', isDark ? '#ff1616' : '#a70000')
        }
      }
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>

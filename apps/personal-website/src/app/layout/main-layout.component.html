<div
  class="bg-background text-on-background min-h-screen transition-colors duration-300 flex flex-col"
>
  <!-- Top Navigation (hidden when printing) -->
  <header
    class="bg-surface text-on-surface flex flex-col md:flex-row gap-4 md:gap-0 min-h-16 md:h-16 items-center justify-between border-b px-6 py-4 md:py-0 print-hidden"
  >
    <div class="flex items-center gap-3 w-full md:w-auto justify-between md:justify-start">
      <a
        class="flex items-center gap-3 hover:opacity-85 transition-opacity"
        routerLink="/"
      >
        <div
          class="bg-primary flex h-8 w-8 items-center justify-center rounded-lg shadow-sm"
        >
          <!-- Stylized Monogram F -->
          <span class="text-primary-foreground font-bold text-sm select-none"
            >FC</span
          >
        </div>
        <span class="text-lg font-bold tracking-tight whitespace-nowrap">
          Francesco Colamonici<span class="text-primary font-medium">.it</span>
        </span>
      </a>
    </div>

    <div class="flex items-center gap-4 sm:gap-6 justify-end w-full md:w-auto">
      <!--
      <a
        class="text-sm font-medium hover:text-primary transition-colors"
        i18n
        routerLink="/blog"
        (mouseenter)="preloadBlog()"
      >
        Blog
      </a>
      -->

      <a
        class="text-sm font-medium bg-primary text-primary-foreground px-3 py-1.5 rounded-md hover:opacity-90 transition-opacity"
        href="https://cal.com/francescocolamonici"
        rel="noopener noreferrer"
        target="_blank"
        i18n
      >
        Book Call
      </a>

      <!-- Language Switcher -->
      <button
        (click)="toggleLanguage()"
        aria-label="Change Language"
        class="text-on-surface-variant hover:text-primary rounded-full px-2.5 py-1.5 transition-colors border border-border flex items-center justify-center gap-1.5 cursor-pointer text-xs font-semibold"
      >
        <svg
          class="h-4 w-4"
          fill="none"
          stroke="currentColor"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <circle cx="12" cy="12" r="10" />
          <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20" />
          <path d="M2 12h20" />
        </svg>
        <span class="uppercase">{{ currentLocale.startsWith('it') ? 'IT' : 'EN' }}</span>
      </button>

      <!-- Dark Mode Switcher -->
      <button
        (click)="themeService.toggleDarkMode()"
        aria-label="Toggle Dark Mode"
        class="text-on-surface-variant hover:text-primary rounded-full p-2 transition-colors border border-border flex items-center justify-center cursor-pointer"
      >
        @if ((themeService.theme$ | async) === 'dark') {
          <!-- Sun icon -->
          <svg
            class="h-4 w-4"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2" />
            <path d="M12 20v2" />
            <path d="M4.93 4.93l1.41 1.41" />
            <path d="M17.66 17.66l1.41 1.41" />
            <path d="M2 12h2" />
            <path d="M20 12h2" />
            <path d="M6.34 17.66l-1.41 1.41" />
            <path d="M19.07 4.93l-1.41 1.41" />
          </svg>
        } @else {
          <!-- Moon icon -->
          <svg
            class="h-4 w-4"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
          </svg>
        }
      </button>
    </div>
  </header>

  <div class="flex-1 flex flex-col">
    <!-- Main Router Outlet -->
    <router-outlet></router-outlet>
  </div>
</div>

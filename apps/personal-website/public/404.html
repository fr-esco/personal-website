<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>404 — Page not found | Francesco Colamonici</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#a70000" />
    <link href="favicon.ico" rel="icon" type="image/x-icon" />
    <script>
      // Match the site's resolved theme (saved preference, else OS).
      var isDark =
        localStorage.theme === 'dark' ||
        (!('theme' in localStorage) &&
          window.matchMedia('(prefers-color-scheme: dark)').matches)
      if (document.documentElement) {
        document.documentElement.classList.toggle('dark', isDark)
        var tc = document.querySelector('meta[name="theme-color"]')
        if (tc) tc.setAttribute('content', isDark ? '#ff1616' : '#a70000')
      }
      // Gentle redirect home (leaves time to read the message).
      setTimeout(function () {
        window.location.replace('/')
      }, 6000)
    </script>
    <style>
      :root {
        --bg: #ffffff;
        --fg: #0a0a0a;
        --muted: #6b7280;
        --primary: #a70000;
      }
      html.dark {
        --bg: #0a0a0a;
        --fg: #fafafa;
        --muted: #9ca3af;
        --primary: #ff1616;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        background: var(--bg);
        color: var(--fg);
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, sans-serif;
        text-align: center;
      }
      main {
        max-width: 32rem;
      }
      .code {
        font-size: clamp(4rem, 18vw, 8rem);
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.03em;
        color: var(--primary);
      }
      h1 {
        margin: 0.5rem 0 0;
        font-size: 1.5rem;
        font-weight: 700;
      }
      p {
        margin: 0.75rem 0 1.75rem;
        color: var(--muted);
        line-height: 1.6;
      }
      a.home {
        display: inline-block;
        padding: 0.65rem 1.4rem;
        border-radius: 0.5rem;
        background: var(--primary);
        color: #fff;
        font-weight: 600;
        text-decoration: none;
        transition: opacity 0.2s ease;
      }
      a.home:hover {
        opacity: 0.9;
      }
      .hint {
        margin-top: 1rem;
        font-size: 0.8rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="code">404</div>
      <h1>Page not found · Pagina non trovata</h1>
      <p>
        The page you're looking for doesn't exist or has moved.<br />
        La pagina che cerchi non esiste o è stata spostata.
      </p>
      <a
        class="home"
        href="/"
        >Back to homepage · Torna alla home</a
      >
      <p class="hint">Redirecting to the homepage… · Reindirizzamento…</p>
    </main>
  </body>
</html>
